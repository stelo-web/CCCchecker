<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCC Authentication System</title>
    <style>
        :root {
            --china-red: #CE1126;
            --china-gold: #FCD116;
            --bg-color: #f4f4f4;
            /* 明朝体系のフォントスタック */
            --font-serif: "Times New Roman", "SimSun", "STSong", "Songti SC", serif;
        }
        body {
            font-family: var(--font-serif);
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            text-align: center;
            color: #1a1a1a;
        }
        .header {
            background-color: var(--china-red);
            color: var(--china-gold);
            padding: 30px 10px;
            border-bottom: 5px solid var(--china-gold);
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header h2 {
            margin: 10px 0 0 0;
            font-size: 18px;
            font-weight: normal;
        }
        .camera-container {
            position: relative;
            width: 90%;
            max-width: 450px;
            aspect-ratio: 4/3;
            margin: 30px auto;
            background: #000;
            border: 2px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--china-gold);
            box-shadow: 0 0 20px 8px rgba(252, 209, 22, 0.7);
            animation: scan 2.5s ease-in-out infinite;
            display: none;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        .btn-main {
            background-color: var(--china-red);
            color: #fff;
            border: 1px solid var(--china-gold);
            padding: 15px 0;
            border-radius: 4px;
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 90%;
            max-width: 450px;
            margin: 10px auto;
            display: block;
            position: relative;
            overflow: hidden;
        }
        .btn-main span {
            display: block;
            font-size: 14px;
            color: var(--china-gold);
            margin-top: 5px;
            font-weight: normal;
        }
        .btn-secondary {
            background-color: #444;
            color: #eee;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            font-family: var(--font-serif);
            cursor: pointer;
        }
        #status-box {
            margin: 25px auto;
            padding: 25px;
            width: 85%;
            max-width: 420px;
            background: #fff;
            border-top: 4px solid var(--china-red);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        #status-en {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 10px 0;
        }
        #status-zh {
            font-size: 16px;
            margin: 0;
        }
        .hidden { display: none !important; }
        .success { color: #1b5e20; }
        .error { color: #b71c1c; }
        .processing { color: #e65100; }
    </style>
</head>
<body>

    <div class="header">
        <h1>China Compulsory Certificate</h1>
        <h2>中国强制性产品认证在线检测系統</h2>
    </div>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" class="hidden"></canvas>
        <div id="scan-effect" class="scan-line"></div>
    </div>

    <button id="btn-action" class="btn-main">
        START SYSTEM
        <span>启动系统</span>
    </button>

    <div id="status-box" class="hidden">
        <p id="status-en"></p>
        <p id="status-zh"></p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnAction = document.getElementById('btn-action');
        const scanEffect = document.getElementById('scan-effect');
        const statusBox = document.getElementById('status-box');
        const statusEn = document.getElementById('status-en');
        const statusZh = document.getElementById('status-zh');

        let mode = 'INIT'; // INIT -> CAMERA -> AUTH
        let stream = null;

        btnAction.addEventListener('click', async (e) => {
            if (mode === 'INIT') {
                startCamera();
            } else if (mode === 'CAMERA') {
                captureImage();
            } else if (mode === 'AUTH') {
                // こっそり判定：ボタンの左側40%なら不合格、それ以外なら合格
                const rect = btnAction.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const isFail = x < (rect.width * 0.4);
                
                runAuthentication(isFail);
            }
        });

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.classList.remove('hidden');
                canvas.classList.add('hidden');
                
                btnAction.innerHTML = 'CAPTURE DEVICE IMAGE<span>拍摄设备图像</span>';
                mode = 'CAMERA';
                statusBox.classList.add('hidden');
            } catch (err) {
                alert('Access Denied.');
            }
        }

        function captureImage() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            
            if (stream) stream.getTracks().forEach(t => t.stop());
            
            btnAction.innerHTML = 'AUTHENTICATE / VERIFY<span>开始认证 / 核实</span>';
            mode = 'AUTH';
        }

        function runAuthentication(isFail) {
            btnAction.disabled = true;
            statusBox.classList.remove('hidden');
            scanEffect.style.display = 'block';
            
            statusEn.className = 'processing';
            statusEn.innerText = "Verifying with China Government Database...";
            statusZh.innerText = "正在核实中国政府认证数据库...";

            setTimeout(() => {
                scanEffect.style.display = 'none';
                btnAction.disabled = false;
                btnAction.innerHTML = 'RESTART SYSTEM<span>重新启动系统</span>';
                mode = 'INIT';

                if (isFail) {
                    statusEn.className = 'error';
                    statusEn.innerText = "Uncertified device.";
                    statusZh.innerText = "该设备未经认证。";
                } else {
                    statusEn.className = 'success';
                    statusEn.innerText = "China Compulsory Certificated.";
                    statusZh.innerText = "中国强制性产品认证合格。";
                }
            }, 3500);
        }
    </script>
</body>
</html>
